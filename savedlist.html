<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f7f4ee">
    <title>Saved Items — Error Correction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #181818; --cream: #fffdf9; --rust: #e96d84; --brown: #9a684e; --line: rgba(24,24,24,.14); }
        * { box-sizing: border-box; }
        body { display: flex; min-height: 100vh; margin: 0; color: var(--ink); background: var(--cream); font-family: "DM Sans", sans-serif; flex-direction: column; }
        a { color: inherit; text-decoration: none; }
        button { color: inherit; cursor: pointer; font: inherit; }
        header { position: sticky; z-index: 10; top: 0; display: flex; justify-content: space-between; align-items: center; padding: 12px clamp(18px,4vw,60px); border-bottom: 1px solid var(--line); background: rgba(255,253,249,.94); backdrop-filter: blur(14px); }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; }
        .logo img { width: 38px; height: 38px; object-fit: cover; border-radius: 50%; mix-blend-mode: multiply; }
        .back { padding: 9px 14px; border: 1px solid var(--line); border-radius: 30px; font-size: 9px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
        main { flex: 1 0 auto; padding: clamp(45px,7vw,90px) clamp(18px,4vw,60px) 100px; }
        h1 { margin: 0; font-family: "Instrument Serif", serif; font-size: clamp(60px,8vw,110px); font-weight: 400; line-height: .82; }
        .saved-grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 60px 22px; }
        .card { min-width: 0; cursor: pointer; }
        .image-wrap { position: relative; aspect-ratio: .84; margin-bottom: 16px; overflow: hidden; border-radius: 4px 42px 4px 4px; background: #f1e9dd; box-shadow: 0 12px 35px rgba(24,24,24,.08); }
        .card:nth-child(3n+2) .image-wrap { border-radius: 42px 4px 4px 4px; }
        .card:nth-child(3n) .image-wrap { border-radius: 4px 4px 42px 4px; }
        .image-wrap img { display: block; width: 100%; height: 100%; object-fit: cover; }
        .remove { position: absolute; top: 11px; right: 11px; display: grid; width: 35px; height: 35px; place-items: center; border: 0; border-radius: 50%; background: rgba(255,253,249,.92); }
        .remove svg { width: 15px; height: 19px; fill: var(--ink); stroke: var(--ink); stroke-linecap: round; stroke-linejoin: round; stroke-width: 2; }
        .meta { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; padding: 0 3px; }
        h2 { margin: 0; font-family: "Instrument Serif", serif; font-size: 23px; font-weight: 400; line-height: 1; }
        .bought { display: inline-flex; align-items: center; gap: 6px; margin-top: 9px; color: #77716c; font-size: 8px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
        .bought::before { width: 5px; height: 5px; border-radius: 50%; background: var(--brown); content: ""; }
        .price { flex: 0 0 auto; font-size: 11px; font-weight: 600; }
        .empty { display: none; min-height: 44vh; place-items: center; text-align: center; }
        .empty.show { display: grid; }
        .empty svg { width: 45px; height: 55px; margin-bottom: 22px; fill: none; stroke: #181818; stroke-width: 1.5; }
        .empty h2 { margin-bottom: 10px; font-size: 38px; }
        .empty p { margin: 0 0 24px; color: #77716c; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
        .browse { display: inline-block; padding: 12px 18px; color: white; border-radius: 30px; background: var(--ink); font-size: 9px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
        footer { display: flex; justify-content: space-between; padding: 22px clamp(18px,4vw,60px) 16px; font-size: 9px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
        .colour-thread { display: grid; grid-template-columns: repeat(6,1fr); height: 2px; margin: 0 8px 8px; }
        .colour-thread span:nth-child(1){background:#65a876}.colour-thread span:nth-child(2){background:#e0b348}.colour-thread span:nth-child(3){background:#9a684e}.colour-thread span:nth-child(4){background:#e96d84}.colour-thread span:nth-child(5){background:#9167bd}.colour-thread span:nth-child(6){background:#181818}
        @media(max-width:1100px){.saved-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
        @media(max-width:780px){header{padding:10px 14px}.logo img{width:34px;height:34px}main{padding:42px 12px 65px}.page-title{margin-bottom:30px}.saved-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:34px 10px}.image-wrap{margin-bottom:11px;border-radius:3px 25px 3px 3px}.card:nth-child(3n+2) .image-wrap{border-radius:25px 3px 3px 3px}.card:nth-child(3n) .image-wrap{border-radius:3px 3px 25px 3px}.remove{top:8px;right:8px;width:38px;height:38px}.meta{display:block;padding:0 2px}h2{font-size:19px}.price{display:inline-block;margin-top:7px;font-size:10px}.bought{margin-top:7px;font-size:7px}footer{padding:18px 14px 14px;font-size:8px}}
        @media(max-width:360px){.logo{font-size:11px}.back{padding:8px 10px}.saved-grid{grid-template-columns:1fr;gap:40px}.image-wrap{aspect-ratio:1/1.08}.meta{display:flex}h2{font-size:23px}.price{margin-top:0}}
    </style>
</head>
<body>
    <header>
        <a class="logo" href="browsing.html"><img src="error-correction-logo.jpg" alt="">Error Correction</a>
        <a class="back" href="browsing.html">Back to browse</a>
    </header>
    <main>
        <div class="saved-grid" id="savedGrid"></div>
        <div class="empty" id="empty">
            <div><svg viewBox="0 0 18 22"><path d="M3 2h12a1 1 0 0 1 1 1v17l-7-5-7 5V3a1 1 0 0 1 1-1Z"/></svg><h2>Nothing saved yet.</h2><p></p><a class="browse" href="browsing.html">Browse</a></div>
        </div>
    </main>
    <footer><span>© 2026 Error Correction</span><span>Instagram · Contact</span></footer>
    <div class="colour-thread" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <script>
        const storageKey = "errorCorrectionFlowerSaved";
        const grid = document.querySelector("#savedGrid");
        const empty = document.querySelector("#empty");

        function getSaved() {
            try { return JSON.parse(localStorage.getItem(storageKey)) || []; }
            catch { return []; }
        }

        function render() {
            const items = getSaved();
            empty.classList.toggle("show", items.length === 0);
            grid.innerHTML = items.map(item => `
                <article class="card" data-name="${item.name}" tabindex="0">
                    <div class="image-wrap"><img src="${item.image}" alt="${item.alt}"><button class="remove" type="button" aria-label="Remove ${item.name}"><svg aria-hidden="true" viewBox="0 0 18 22"><path d="M3 2h12a1 1 0 0 1 1 1v17l-7-5-7 5V3a1 1 0 0 1 1-1Z"/></svg></button></div>
                    <div class="meta"><div><h2>${item.name}</h2><span class="bought">${item.bought} bought</span></div><span class="price">${item.price}</span></div>
                </article>`).join("");
            document.querySelectorAll(".remove").forEach(button => button.addEventListener("click", event => {
                event.stopPropagation();
                const name = button.closest(".card").dataset.name;
                localStorage.setItem(storageKey, JSON.stringify(getSaved().filter(item => item.name !== name)));
                render();
            }));
            document.querySelectorAll(".card").forEach(card => {
                const open = () => {
                    const item = getSaved().find(saved => saved.name === card.dataset.name);
                    if (item) location.href = `productview.html?${new URLSearchParams(item)}`;
                };
                card.addEventListener("click", event => { if (!event.target.closest(".remove")) open(); });
                card.addEventListener("keydown", event => { if (event.key === "Enter") open(); });
            });
        }

        window.addEventListener("storage", render);
        render();
    </script>
</body>
</html>
