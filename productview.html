        .lightbox { position:fixed; z-index:30; inset:0; display:none; place-items:center; padding:20px; background:rgba(0,0,0,.88); }

        /* Unified footer - Silicon Mania style */
        footer {
            position: relative;
            overflow: hidden;
            padding: clamp(24px, 4vw, 42px) clamp(18px, 4vw, 60px) 24px;
            background: var(--cream);
            border-top: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .footer-main {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .footer-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .social-link {
            position: relative;
            display: inline-flex;
            width: 34px;
            height: 34px;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 50%;
            background: transparent;
            transition: all 0.3s ease-in-out;
            border: 1px solid var(--line);
        }
        .social-link:hover {
            box-shadow: 0 8px 12px -3px rgba(0, 0, 0, 0.1);
            border-color: transparent;
        }
        .social-link-bg {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .social-link:hover .social-link-bg {
            opacity: 1;
        }
        .social-link svg {
            position: relative;
            z-index: 10;
            width: 15px;
            height: 15px;
            fill: currentColor;
            color: var(--ink);
            transition: color 0.3s ease-in-out;
        }
        .social-link:hover svg {
            color: white;
        }
        .eyebrow {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #6b6b6b;
        }
        .text-ink-3 {
            color: #b5b5b5;
        }
        .bar-stack {
            width: 100%;
            height: 2px;
            display: flex;
            overflow: hidden;
            margin-top: 8px;
        }
        .bar-stack > span {
            flex: 1 1 0;
            height: 100%;
            display: block;
            transform-origin: 0;
            transform: scaleX(0);
        }
        .bar-stack > span:nth-child(1) { background: #5dbe3d; }
        .bar-stack > span:nth-child(2) { background: #f5c518; }
        .bar-stack > span:nth-child(3) { background: #f08a1c; }
        .bar-stack > span:nth-child(4) { background: #e63d38; }
        .bar-stack > span:nth-child(5) { background: #9a3db3; }
        .bar-stack > span:nth-child(6) { background: #1fa8e8; }

        @keyframes bar-rise {
            0% { transform: scaleX(0); }
            100% { transform: scaleX(1); }
        }
        .bar-stack.is-visible > span {
            animation: bar-rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .bar-stack.is-visible > span:nth-child(1) { animation-delay: 0s; }
        .bar-stack.is-visible > span:nth-child(2) { animation-delay: 0.1s; }
        .bar-stack.is-visible > span:nth-child(3) { animation-delay: 0.2s; }
        .bar-stack.is-visible > span:nth-child(4) { animation-delay: 0.3s; }
        .bar-stack.is-visible > span:nth-child(5) { animation-delay: 0.4s; }
        .bar-stack.is-visible > span:nth-child(6) { animation-delay: 0.5s; }

        @media (max-width: 600px) {
            .footer-main {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 14px;
            }
            .footer-links {
                justify-content: center;
            }
        }
        footer .footer-main { justify-content:flex-start; }
        footer .footer-links { display:flex; justify-content:flex-start; visibility:visible; opacity:1; }
        footer .footer-links a { display:inline-flex; color:var(--ink); visibility:visible; opacity:1; }
        @media (max-width:600px) {
            footer .footer-main { align-items:flex-start; text-align:left; }
            footer .footer-links { justify-content:flex-start; }
        }
    </style>

    <script>
        const storageKey = "errorCorrectionFlowerSaved";
        const params = new URLSearchParams(location.search);
        const adminKey = params.get("admin");
        let product = {name:params.get("name")||"Lavender Tulip Bouquet",price:params.get("price")||"₹2,400",bought:params.get("bought")||"500",image:params.get("image")||"",alt:params.get("alt")||"Crochet flower product"};

        ];

        function getSaved(){try{return JSON.parse(localStorage.getItem(storageKey))||[]}catch{return[]}}
        function syncSave(){const active=getSaved().some(item=>item.name===product.name);save.classList.toggle("active",active);save.querySelector("span").textContent=active?"Saved":"Save"}
        function openLightbox(item){const talk=document.querySelector("#talkCustomer");const isReview=item.classList.contains("review");const instagram=item.dataset.instagram||"";lightbox.querySelector("img").src=item.querySelector("img").src;talk.href=instagram||"#";talk.textContent=instagram?"Talk to customer ↗":"Instagram not added";talk.classList.toggle("show",isReview);talk.classList.toggle("disabled",!instagram);lightbox.classList.add("show")}
        function renderProduct(){
            const photoPool=[...catalogProducts.map(item=>item.image),...fallbackPhotos].filter((image,index,list)=>image&&list.indexOf(image)===index);
            const galleryItems=[{image:product.image,kind:"main",index:0},...(product.gallery||[]).slice(0,6).map((image,index)=>({image,kind:"gallery",index}))];
            const reviewItems=product.reviews||[];
            document.title=`${product.name} — Error Correction`;
            document.querySelector("#name").textContent=product.name;
            document.querySelector("#price").textContent=product.price;
            document.querySelector("#bought").textContent=`${product.bought} bought`;
            document.querySelector("#buy").href=`https://wa.me/919855696486?text=${encodeURIComponent(`Hi, I would like to buy ${product.name} (${product.price}).`)}`;
            gallery.innerHTML=galleryItems.map((item,index)=>`<button type="button" aria-label="View product image ${index+1}"><img src="${item.image}" alt="${item.kind==="main"?product.alt:`${product.name} detail`}"><span class="media-admin" data-kind="${item.kind==="main"?"main":"gallery"}" data-index="${item.kind==="main"?0:index-1}">Replace</span></button>`).join("");
            reviews.innerHTML=reviewItems.map((review,index)=>`<div class="review" data-instagram="${review.instagram||""}"><img src="${review.image}" alt="Review photo ${index+1}">${review.instagram?`<a href="${review.instagram}" target="_blank" rel="noopener">${review.name||"Customer"} &#8599;</a>`:`<span>${review.name||"Customer"}</span>`}<button class="media-admin" data-kind="review" data-index="${index}" type="button">Replace</button></div>`).join("");
            document.querySelector(".reviews").hidden=!reviewItems.length&&!document.body.classList.contains("admin-mode");
            document.querySelectorAll(".gallery button,.review").forEach(item=>item.addEventListener("click",()=>openLightbox(item)));
            document.querySelectorAll(".review a").forEach(link=>link.addEventListener("click",event=>event.stopPropagation()));
            document.querySelectorAll(".media-admin").forEach(button=>button.addEventListener("click",event=>{event.stopPropagation();openAdmin(button.dataset.kind,+button.dataset.index)}));
            document.querySelector("#reviewCount").value=String(product.reviewCount||5);
            syncSave();
        }
        async function loadProduct(){
            const id=params.get("id");
            try{const response=await fetch("/api/products");catalogProducts=await response.json();if(id)product=catalogProducts.find(item=>item.id===id)||product}catch{}
            renderProduct();
            setupAdmin();
        }
        async function setupAdmin(){
            if(!adminKey||!params.get("id"))return;
            try{const response=await fetch(`/api/admin-status?admin=${encodeURIComponent(adminKey)}`);if(response.ok&&(await response.json()).admin){document.body.classList.add("admin-mode");document.querySelector(".reviews").hidden=false}}catch{}
        }
        function openAdmin(kind,index){adminMode=kind;adminIndex=index;document.querySelector("#adminForm").reset();const isReview=kind==="review";document.querySelector("#adminTitle").textContent=isReview?"Edit review":"Replace product photo";document.querySelector("#adminNameLabel").hidden=!isReview;document.querySelector("#adminInstagramLabel").hidden=!isReview;document.querySelector("#adminPhoto").required=!isReview;if(isReview){const review=product.reviews[index];document.querySelector("#adminReviewName").value=review.name||"Customer";document.querySelector("#adminReviewInstagram").value=review.instagram||""}document.querySelector("#adminModal").classList.add("show")}
        document.querySelector("#adminCancel").addEventListener("click",()=>document.querySelector("#adminModal").classList.remove("show"));
        document.querySelector("#adminForm").addEventListener("submit",async event=>{event.preventDefault();const base=`/api/products/${params.get("id")}`;const path=adminMode==="main"?`${base}/main-photo`:adminMode==="gallery"?`${base}/gallery/${adminIndex}`:`${base}/reviews/${adminIndex}`;const response=await fetch(`${path}?admin=${encodeURIComponent(adminKey)}`,{method:"PUT",body:new FormData(event.currentTarget)});if(response.ok){product=await response.json();document.querySelector("#adminModal").classList.remove("show");renderProduct()}});
        document.querySelector("#reviewCount").addEventListener("change",async event=>{const data=new FormData();data.set("count",event.target.value);const response=await fetch(`/api/products/${params.get("id")}/review-count?admin=${encodeURIComponent(adminKey)}`,{method:"PUT",body:data});if(response.ok){product=await response.json();renderProduct()}});
        save.addEventListener("click",()=>{const items=getSaved();const index=items.findIndex(item=>item.name===product.name);if(index>=0)items.splice(index,1);else items.push(product);localStorage.setItem(storageKey,JSON.stringify(items));syncSave()});
        lightbox.querySelector("button").addEventListener("click",()=>lightbox.classList.remove("show"));
        lightbox.addEventListener("click",event=>{if(event.target===lightbox)lightbox.classList.remove("show")});
        loadProduct();

        // Footer accent bar observer
        const footerObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.bar-stack.stagger').forEach(el => footerObserver.observe(el));
    </script>
</body>
</html>
